<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zdravo svete</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f0f0f0;
        }
        #tekst {
            font-size: 28px;
            line-height: 1.6;
            min-height: 200px;
            color: #333;
        }
    </style>
</head>
<body>

    <h1>Poruka</h1>
    <div id="tekst"></div>

    <script>
        const tekst = "Zdravo svete. Ja sam Marko Ostojić.";
        const rijeci = tekst.split(' '); // razdvajamo po razmacima

        let index = 0;
        let interval;

        const container = document.getElementById('tekst');

        function pokreniPrikaz() {
            container.innerHTML = ''; // očisti prethodni tekst
            index = 0;

            interval = setInterval(() => {
                if (index < rijeci.length) {
                    // dodaj riječ + razmak
                    container.innerHTML += rijeci[index] + ' ';
                    index++;
                } else {
                    // kada završi sve riječi
                    clearInterval(interval);
                    
                    // sačekaj 5 sekundi pa ponovo pokreni
                    setTimeout(() => {
                        pokreniPrikaz();
                    }, 5000);
                }
            }, 1000); // svaka riječ svake sekunde
        }

        // Pokreni prvi put
        pokreniPrikaz();
    </script>

</body>
</html>
